name: Android Build
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # 赋予gradlew执行权限
      - name: Add execute permission
        run: chmod +x ./gradlew

      # 替换阿里云Maven镜像，解决海外依赖超时
      - name: Replace maven mirror
        run: |
          sed -i 's|google()|maven { url "https://dl.aliyuncs.com/android/android" }\ngoogle()|g' build.gradle
          sed -i 's|mavenCentral()|maven { url "https://maven.aliyun.com/repository/public" }\nmavenCentral()|g' build.gradle
          sed -i '1i maven { url "https://developer.huawei.com/repo/" }' build.gradle

      # 编译Debug包
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 上传APK产物
      - name: Upload built APK
        uses: actions/upload-artifact@v4
        with:
          name: PetStore-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
