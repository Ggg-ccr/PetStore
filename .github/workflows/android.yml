name: Android Build
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 旧Gradle3.5强制使用JDK8
      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: 替换build.gradle为国内镜像，加速依赖下载
        run: |
          sed -i 's|jcenter()|maven { url "https://maven.aliyun.com/repository/public" }|g' build.gradle
          sed -i 's|google()|maven { url "https://dl.aliyuncs.com/android/android" }\ngoogle()|g' build.gradle

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PetStore-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
