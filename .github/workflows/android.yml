name: Android Build
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
      - name: Grant execute permission
        run: chmod +x HMSPetStoreApp/gradlew
      - name: Build APK
        working-directory: ./HMSPetStoreApp
        run: ./gradlew assembleDebug
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: HMSPetStoreApp/app/build/outputs/apk/debug/*.apk
